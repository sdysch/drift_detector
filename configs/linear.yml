tracking:
  uri: sqlite:///mlflow.db

data:
  path: data/train.csv
  target: target

features:
  numeric:
    - feature_1
    - feature_2
    - feature_3
    - feature_gaussian
    - feature_lognormal
    - feature_exponential

  categorical:
    - category
    - type

random_state: 42

model:
  name: linear

params: {}

study:
  name: linear-optimisation
  storage: sqlite:///optuna.db

optuna:
  metric: rmse
  n_trials: 100
  n_jobs: 4
