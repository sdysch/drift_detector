model:
  name: xgboost

params:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 6

optuna:
  enabled: true

  search_space:
    n_estimators:
      type: int
      low: 100
      high: 1000

    learning_rate:
      type: float
      low: 0.001
      high: 0.3
      log: true

    max_depth:
      type: int
      low: 3
      high: 12
