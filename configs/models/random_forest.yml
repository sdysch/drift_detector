model:
  name: random_forest

study:
  name: random_forest-optimisation
  storage: sqlite:///optuna.db

params:
  n_estimators: 200
  max_depth: 10
  min_samples_split: 2

optuna:
  enabled: true

  search_space:
    n_estimators:
      type: int
      low: 50
      high: 500

    max_depth:
      type: int
      low: 2
      high: 30

    min_samples_split:
      type: int
      low: 2
      high: 20
